async function hydrateFromSupabase(){
  if(!window.CEBackend) return false;
  const ctx = await CEBackend.contextoAtual();
  if(!ctx || !ctx.perfil || !ctx.empresa) return false;
  if(ctx.perfil.status !== "approved") throw new Error("Seu acesso foi enviado, mas ainda está pendente de aprovação pelo ADM principal.");
  const empresaId = ctx.empresa.id;
  const [setoresDb, clientesDb, tarefasDb, histDb, pendDb] = await Promise.all([
    CEBackend.listarSetores(empresaId),
    CEBackend.listarClientes(empresaId),
    CEBackend.listarTarefas(empresaId),
    CEBackend.listarHistorico(empresaId).catch(()=>[]),
    CEBackend.listarSolicitacoesPendentes(empresaId).catch(()=>[])
  ]);
  const {data: perfisDb, error: perfisError} = await CEBackend.supabaseClient.from("usuarios_empresa").select("*").eq("empresa_id", empresaId).order("criado_em", {ascending:true});
  if(perfisError) throw perfisError;
  const company={
    id:ctx.empresa.id,
    name:ctx.empresa.nome,
    email:ctx.empresa.email_principal,
    password:"",
    createdAt:dbDate(ctx.empresa.criada_em),
    sectors:(setoresDb||[]).map(mapSetorDb),
    clients:(clientesDb||[]).map(mapClientDb),
    requests:(pendDb||[]).map(p=>({id:p.id,profileId:p.id,name:p.nome,email:p.email,status:p.status,createdAt:dbDate(p.criado_em)}))
  };
  state={companies:[company],users:(perfisDb||[]).map(mapProfileDb),tasks:(tarefasDb||[]).map(mapTaskDb),logs:(histDb||[]).map(mapLogDb),passwordResets:[]};
  session={userId:ctx.perfil.user_id,companyId:empresaId};
  usingSupabase=true;
  save(); saveSession();
  return true;
}
async function syncClientToSupabase(c){
  if(!usingSupabase || !window.CEBackend || syncingRemote) return;
  try{
    if(String(c.id).startsWith("cli_")){
      const saved = await CEBackend.salvarCliente(clientToDb(c));
      c.id=saved.id; c.createdAt=dbDate(saved.criado_em); save();
    } else {
      await CEBackend.atualizarCliente(c.id, clientToDb(c));
    }
  }catch(e){console.error(e);toast("Não consegui sincronizar o cliente no banco: "+e.message);}
}
async function syncTaskToSupabase(t){
  if(!usingSupabase || !window.CEBackend || syncingRemote) return;
  try{
    if(String(t.id).startsWith("tsk_")){
      const saved = await CEBackend.salvarTarefa(taskToDb(t));
      t.id=saved.id; t.createdAt=dbDate(saved.criado_em); t.updatedAt=dbDate(saved.atualizado_em); save();
    } else {
      await CEBackend.atualizarTarefa(t.id, taskToDb(t));
    }
  }catch(e){console.error(e);toast("Não consegui sincronizar a tarefa no banco: "+e.message);}
}

  const app=document.getElementById("app");
  app.innerHTML='<section class="auth-shell"><div class="auth-hero"><div class="brand"><div class="brand-mark">CE</div><div><h1>Controle Escritório</h1><p>Carregando sistema...</p></div></div></div></section>';

  render();
}

function hexToRgb(hex){ hex=String(hex||"").replace("#",""); if(hex.length===3) hex=hex.split("").map(x=>x+x).join(""); const n=parseInt(hex,16); return {r:(n>>16)&255,g:(n>>8)&255,b:n&255}; }
function isDarkColor(hex){ try{const {r,g,b}=hexToRgb(hex); return ((r*299+g*587+b*114)/1000)<145;}catch(e){return false;} }

function setupMoneyInput(id,previewId){ const el=document.getElementById(id); if(!el)return; const update=()=>{ const n=parseMoney(el.value); el.value=formatMoney(n); if(previewId&&document.getElementById(previewId)) document.getElementById(previewId).textContent=formatMoney(n); }; el.onfocus=()=>{ const n=parseMoney(el.value); el.value=n?String(n).replace('.',','):''; }; el.onblur=update; update(); }

function bindAuth(){
  document.querySelectorAll("[data-auth-tab]").forEach(btn=>btn.onclick=()=>{
    document.querySelectorAll("[data-auth-tab]").forEach(b=>b.classList.remove("active")); btn.classList.add("active");
    ["authLogin","authCompany","authUser"].forEach(id=>document.getElementById(id).classList.add("hidden"));
    document.getElementById(btn.dataset.authTab==="login"?"authLogin":btn.dataset.authTab==="company"?"authCompany":"authUser").classList.remove("hidden");
  });
  document.getElementById("btnLogin").onclick=async()=>{
    const email=document.getElementById("loginEmail").value.trim().toLowerCase();
    const pass=document.getElementById("loginPass").value;
    if(!email||!pass) return toast("Informe e-mail e senha.");
    try{
      if(window.CEBackend){
        await CEBackend.login(email,pass);
        await hydrateFromSupabase();
        screen="dashboard"; render(); toast("Login realizado com sucesso."); return;
      }
      const u=state.users.find(x=>x.email.toLowerCase()===email && x.password===pass && x.status!=="pending");
      if(!u) return toast("E-mail ou senha inválidos, ou usuário ainda não aprovado.");
      session={userId:u.id,companyId:u.companyId}; saveSession(); screen="dashboard"; render();
    }catch(e){toast(e.message||"Não foi possível entrar.");}
  };
  document.getElementById("btnCreateCompany").onclick=async()=>{
    const name=document.getElementById("companyName").value.trim();
    const email=document.getElementById("companyEmail").value.trim().toLowerCase();
    const adminName=document.getElementById("companyAdminName").value.trim()||"ADM Principal";
    const p=document.getElementById("companyPass").value; const p2=document.getElementById("companyPass2").value;
    if(!name||!email||!p) return toast("Preencha nome, e-mail e senha.");
    if(p!==p2) return toast("As senhas não conferem.");
    try{
      if(window.CEBackend){
        await CEBackend.cadastrarEmpresa({nomeEmpresa:name,emailEmpresa:email,nomeUsuario:adminName,emailUsuario:email,senha:p});
        await hydrateFromSupabase();
        screen="dashboard"; render(); toast("Empresa criada no banco com sucesso."); return;
      }
      if(state.companies.some(c=>c.email.toLowerCase()===email)) return toast("Já existe empresa com esse e-mail.");
      const companyId=uid("comp_"); const userId=uid("usr_");
      const company={id:companyId,name,email,password:p,createdAt:now(),sectors:deepClone(SECTOR_LIBRARY),clients:[],requests:[]};
      const user={id:userId,companyId,name:adminName,email,password:p,role:"owner",permissions:company.sectors.map(s=>s.key),preferences:{}};
      state.companies.push(company); state.users.push(user); session={userId,companyId}; save(); saveSession(); render(); toast("Empresa criada com sucesso.");
    }catch(e){toast(e.message||"Erro ao criar empresa no banco.");}
  };
  document.getElementById("btnRequestAccess").onclick=async()=>{
    const name=document.getElementById("reqName").value.trim(); const email=document.getElementById("reqEmail").value.trim().toLowerCase(); const companyEmail=document.getElementById("reqCompanyEmail").value.trim().toLowerCase(); const pass=document.getElementById("reqPass").value; const pass2=document.getElementById("reqPass2").value;
    if(!name||!email||!companyEmail||!pass) return toast("Preencha todos os campos.");
    if(pass!==pass2) return toast("As senhas não conferem.");
    try{
      if(window.CEBackend){
        await CEBackend.cadastrarUsuarioSolicitandoAcesso({nome,email,senha:pass,emailEmpresa:companyEmail});
        toast("Solicitação enviada ao ADM principal. Aguarde aprovação."); return;
      }
      const company=state.companies.find(c=>c.email.toLowerCase()===companyEmail);
      if(!company) return toast("Empresa não encontrada.");
      if(state.users.some(u=>u.email.toLowerCase()===email && u.companyId===company.id)) return toast("Esse e-mail já existe nessa empresa.");
      company.requests.push({id:uid("req_"),name,email,password:pass,createdAt:now(),status:"pending"}); save(); toast("Solicitação enviada ao ADM principal.");
    }catch(e){toast(e.message||"Erro ao enviar solicitação.");}
  };
  document.getElementById("forgotPass").onclick=openForgotPassword;
  document.getElementById("demoBtn").onclick=createDemo;
}

function renderSectorCard(s){
  const sum=sectorSummary(s.key); const locked=!canAccessSector(s.key);
  return `<button class="sector-card" data-sector="${s.key}" style="border-top:4px solid ${s.color}">
    <div class="sector-icon">${s.icon}</div><h4>${escapeHtml(s.name)}</h4><p>${escapeHtml(s.desc)}</p>
    <span class="status-pill ${locked?'bad':sum.pending>0?'warn':'ok'}">${locked?'Sem acesso':sum.done+' concluídas • '+sum.pending+' pendentes'}</span>
  </button>`;
}
function kpi(label,value,sub,kind,icon){ return `<div class="kpi ${kind}"><div class="icon">${icon}</div><label>${label}</label><strong>${value}</strong><small>${sub}</small></div>`; }
function sectorSummaryAll(){ return state.tasks.filter(t=>t.companyId===getCompany().id).reduce((a,t)=>{ if(normalizeStatusForDone(t.status)) a.done++; else a.pending++; return a; },{done:0,pending:0}); }
function sectorSummary(key){ return state.tasks.filter(t=>t.companyId===getCompany().id && t.sectorKey===key && t.competence===filterState.competence).reduce((a,t)=>{ if(normalizeStatusForDone(t.status)) a.done++; else a.pending++; a.total++; return a; },{done:0,pending:0,total:0}); }
function completionRate(key){ const list=state.tasks.filter(t=>t.companyId===getCompany().id && (!key||t.sectorKey===key) && t.competence===filterState.competence); if(!list.length)return 0; return Math.round(list.filter(t=>normalizeStatusForDone(t.status)).length/list.length*100); }
function bestSectorName(){ const company=getCompany(); let best={name:"-",rate:-1}; company.sectors.forEach(s=>{const r=completionRate(s.key); if(r>best.rate){best={name:s.name,rate:r}}}); return best.name; }
function renderMonthlyBars(){
  const data=MONTHS.slice(0,6).map(m=>({m,done:state.tasks.filter(t=>t.companyId===getCompany().id&&t.competence===m&&normalizeStatusForDone(t.status)).length}));
  const max=Math.max(1,...data.map(d=>d.done));
  return `<div class="bar-chart">${data.map(d=>`<div class="bar-row"><span>${d.m}</span><div class="bar-bg"><i style="width:${Math.round(d.done/max*100)}%"></i></div><b>${d.done}</b></div>`).join("")}</div>`;
}

function renderSectorKPIs(key){
  const base = primaryCounts(key); const list=filteredTasks(key); const late=list.filter(t=>t.status==="Atrasada").length; const clients=new Set(list.map(t=>t.clientId)).size;
  if(key==="contabil"){

function openProfitModal(taskId){
  const t=state.tasks.find(x=>x.id===taskId); if(!t) return;
  const body=`<div class="form-grid"><div class="notice">Cliente: <b>${escapeHtml(clientName(t.clientId))}</b> • Competência ${escapeHtml(t.competence)}</div><div class="row"><div class="field"><label>Quantidade de dinheiro</label><input id="profitValue" value="${formatMoney(t.value)}"><div class="money-preview" id="profitPreview">${formatMoney(t.value)}</div></div><div class="field"><label>Sócio / beneficiário</label><input id="profitPartner" value="${escapeHtml(t.partner||"")}" placeholder="Nome do sócio que recebeu"></div></div><div class="field"><label>Status</label><select id="profitStatus"><option ${t.status==='Pendente'?'selected':''}>Pendente</option><option ${t.status==='Registrada'?'selected':''}>Registrada</option><option ${t.status==='Enviada ao cliente'?'selected':''}>Enviada ao cliente</option></select></div><div class="field"><label>Observação</label><textarea id="profitNotes">${escapeHtml(t.notes||"")}</textarea></div></div>`;
  openModal("Registrar distribuição de lucros", body, `<button class="btn secondary" id="cancelModal">Cancelar</button><button class="btn gold" id="saveProfit">Salvar registro</button>`, true);
  setupMoneyInput("profitValue","profitPreview");
  document.getElementById("cancelModal").onclick=closeModal;
  document.getElementById("saveProfit").onclick=()=>{t.value=parseMoney(val("profitValue")); t.partner=val("profitPartner"); t.status=val("profitStatus"); t.notes=val("profitNotes"); t.updatedBy=getUser().id; t.updatedAt=now(); addLog("contabil","Distribuição de lucros registrada",`${clientName(t.clientId)} • ${formatMoney(t.value)} • ${t.partner||'sem sócio informado'}`); save(); closeModal(); render(); toast("Distribuição salva.");};
}
function renderOperationalTab(sector, tab){
  const tasks=tabTasksOpen(sector.key,tab); const flow=getWorkflowConfig(sector.key,tab);
  return `<div class="lux-card panel"><div class="section-head"><div><h3>${escapeHtml(tabLabel(tab))}</h3><p>Controle operacional de ${escapeHtml(sector.name)} em ${filterState.competence}. Nesta aba, o foco fica nas tarefas abertas.</p></div><div class="toolbar-right"><button class="btn gold small" data-new-task-tab="${escapeHtml(tab)}">+ Adicionar</button><button class="btn secondary small" data-export-sector>Exportar CSV</button></div></div><div class="task-flow-note" style="margin-bottom:16px"><b>Ações pré-definidas desta aba:</b> ${flow.titleOptions.map(x=>escapeHtml(x)).join(" • ")}<br><b>Status disponíveis:</b> ${flow.statusOptions.map(x=>escapeHtml(x)).join(" • ")}</div>${renderTasksTable(tasks,true)}</div>`;
}
function renderTasksTable(tasks, actions=true){
  if(!tasks.length) return `<div class="empty"><b>Nenhuma tarefa encontrada</b>Use “Nova tarefa” ou gere as pendências mensais para alimentar este setor.</div>`;
  return `<div class="table-wrap"><table><thead><tr><th>${L("Cliente")}</th><th>Tarefa</th><th>${L("Status")}</th><th>${L("Responsável")}</th><th>${L("Quantidade de dinheiro")}</th><th>Prazo</th><th>${L("Atualizado por")}</th>${actions?`<th>${L("Ações")}</th>`:""}</tr></thead><tbody>${tasks.map(t=>`<tr><td class="client-cell"><b>${escapeHtml(clientName(t.clientId))}</b><span>${escapeHtml(t.competence)}</span></td><td><b>${escapeHtml(t.title)}</b><br><span class="muted micro">${escapeHtml(t.notes||"")}</span><br><span class="status-pill ${statusClass(t.priority)}">${escapeHtml(t.priority||"Normal")}</span></td><td><span class="status-pill ${statusClass(t.status)}">${escapeHtml(t.status)}</span></td><td>${escapeHtml(t.responsible||"-")}</td><td><b>${formatMoney(t.value)}</b></td><td>${escapeHtml(t.dueDate||"-")}</td><td>${escapeHtml(userName(t.updatedBy||t.createdBy))}<br><span class="micro muted">${escapeHtml(t.updatedAt||t.createdAt)}</span></td>${actions?`<td><button class="btn secondary small" data-edit-task="${t.id}">${L("Editar")}</button><button class="btn success small" data-done-task="${t.id}">${L("Finalizar")}</button></td>`:""}</tr>`).join("")}</tbody></table></div>`;
}
function renderRanking(key){
  const list=filteredTasks(key); const people={}; list.forEach(t=>{const p=t.responsible||"Sem responsável"; people[p]??={name:p,total:0,done:0,late:0,hours:0}; people[p].total++; if(normalizeStatusForDone(t.status))people[p].done++; if(t.status==='Atrasada')people[p].late++; people[p].hours+=Number(t.avgHours)||0;});
  const rows=Object.values(people).sort((a,b)=>b.done-a.done);
  return `<div class="lux-card panel"><div class="section-head"><div><h3>Ranking de colaboradores</h3><p>Score = concluídas/enviadas, menos atrasos, considerando volume e tempo médio.</p></div></div>${rows.length?`<div class="table-wrap"><table><thead><tr><th>Posição</th><th>Colaborador</th><th>Total</th><th>Concluídas</th><th>Atrasos</th><th>Tempo médio</th><th>Score</th></tr></thead><tbody>${rows.map((r,i)=>{const avg=r.total?(r.hours/r.total).toFixed(1):0; const score=(r.done*10)-(r.late*4)+Math.max(0,20-Math.round(avg)); return `<tr><td>${i===0?'🥇':i===1?'🥈':i===2?'🥉':'#'+(i+1)}</td><td><b>${escapeHtml(r.name)}</b></td><td>${r.total}</td><td>${r.done}</td><td>${r.late}</td><td>${avg}h</td><td><b>${score}</b></td></tr>`}).join("")}</tbody></table></div>`:`<div class="empty"><b>Sem dados para ranking</b>Cadastre tarefas com responsáveis.</div>`}</div>`;
}
function renderPerformance(key){
  const months=MONTHS.slice(0,6); const max=Math.max(1,...months.map(m=>state.tasks.filter(t=>t.companyId===getCompany().id&&t.sectorKey===key&&t.competence===m&&(normalizeStatusForDone(t.status))).length));
  const current=filteredTasks(key); const overdue=current.filter(t=>t.status==='Atrasada').length; const total=current.length; const value=current.reduce((a,t)=>a+(Number(t.value)||0),0);
  return `<div class="two-grid"><div class="lux-card panel"><div class="section-head"><div><h3>Análise de performance</h3><p>Comparação mensal, conclusão, atrasos e valor movimentado.</p></div></div><div class="bar-chart">${months.map(m=>{const n=state.tasks.filter(t=>t.companyId===getCompany().id&&t.sectorKey===key&&t.competence===m&&(normalizeStatusForDone(t.status))).length; return `<div class="bar-row"><span>${m}</span><div class="bar-bg"><i style="width:${Math.round(n/max*100)}%"></i></div><b>${n}</b></div>`}).join("")}</div></div><div class="lux-card panel"><div class="section-head"><div><h3>Indicadores executivos</h3><p>Dados prontos para acompanhamento gerencial.</p></div></div><div class="metric-list"><div class="metric-item"><span>Taxa de conclusão</span><b>${total?Math.round((total-overdue)/total*100):0}%</b></div><div class="metric-item"><span>Tarefas no período</span><b>${total}</b></div><div class="metric-item"><span>Atrasos</span><b>${overdue}</b></div><div class="metric-item"><span>Valor registrado</span><b>R$ ${value.toLocaleString('pt-BR')}</b></div><div class="metric-item"><span>Tempo médio por tarefa</span><b>${avgTime(current)}h</b></div></div></div></div>`;
}
function renderSectorReport(key){
  return `<div class="lux-card panel"><div class="section-head"><div><h3>Relatório executivo</h3><p>Prévia do relatório do setor. Você pode baixar em HTML.</p></div><button class="btn gold" data-download-sector-report="${key}">Baixar relatório</button></div>${buildReportHTML([key],false)}</div>`;
}
function renderHistoryList(logs){ if(!logs.length)return `<div class="empty"><b>Sem histórico</b>As alterações feitas neste setor aparecerão aqui.</div>`; return `<div class="history-list">${logs.map(l=>`<div class="history-item"><b>${escapeHtml(l.action)} • ${escapeHtml(l.userName)}</b><span>${escapeHtml(l.detail)} • ${escapeHtml(l.date)}</span></div>`).join("")}</div>`; }
function teamOptions(){ return state.users.filter(u=>u.companyId===getCompany().id).map(u=>u.name); }

function bindDynamicActions(){
  document.querySelectorAll("[data-screen-jump]").forEach(b=>b.onclick=()=>{screen=b.dataset.screenJump;render();});
  document.querySelectorAll("[data-tab]").forEach(b=>b.onclick=()=>{activeTab=b.dataset.tab;render();});
  const filt=document.querySelector("[data-open-filters]"); if(filt) filt.onclick=()=>{filtersOpen=!filtersOpen;render();};
  ["fCompetence","fStatus","fResp","fClient","fPriority"].forEach(id=>{const el=document.getElementById(id); if(el) el.onchange=()=>{filterState={competence:document.getElementById("fCompetence").value,status:document.getElementById("fStatus").value,responsible:document.getElementById("fResp").value,client:document.getElementById("fClient").value,priority:document.getElementById("fPriority").value}; render();};});
  const addClient=document.getElementById("addClient"); if(addClient) addClient.onclick=async()=>{ const c={id:uid("cli_"),name:val("cliName"),cnpj:val("cliCnpj"),plan:val("cliPlan"),responsible:val("cliResponsible"),segment:val("cliSegment"),active:true,createdAt:now()}; if(!c.name)return toast("Informe o nome do cliente."); getCompany().clients.push(c); await syncClientToSupabase(c); generateFrequentTasksForClient(c.id, filterState.competence); addLog("gestao","Cliente cadastrado",`${c.name} foi adicionado à base geral e entrou nos controles dos setores`); save(); render(); toast("Cliente adicionado e tarefas frequentes criadas."); };
  const gen=document.getElementById("generateMonth"); if(gen) gen.onclick=()=>{generateMonthlyTasks(filterState.competence,true);render();toast("Pendências mensais geradas para todos os setores.");};
  document.querySelectorAll("[data-toggle-client]").forEach(b=>b.onclick=async()=>{const c=getCompany().clients.find(x=>x.id===b.dataset.toggleClient); c.active=c.active===false; await syncClientToSupabase(c); addLog("gestao","Status de cliente alterado",`${c.name}: ${c.active?'ativo':'inativo'}`); save(); render();});
  document.querySelectorAll("[data-del-client]").forEach(b=>b.onclick=()=>{const company=getCompany(); const c=company.clients.find(x=>x.id===b.dataset.delClient); company.clients=company.clients.filter(x=>x.id!==b.dataset.delClient); addLog("gestao","Cliente excluído",`${c?.name||'Cliente'} foi removido`); save(); render();});
  document.querySelectorAll("[data-approve]").forEach(b=>b.onclick=()=>approveRequest(b.dataset.approve));
  document.querySelectorAll("[data-reject]").forEach(b=>b.onclick=()=>{const r=getCompany().requests.find(x=>x.id===b.dataset.reject); if(r)r.status="rejected"; save(); render(); toast("Solicitação recusada.");});
  document.querySelectorAll("[data-open-add-sector]").forEach(b=>b.onclick=openAddSector);
  document.querySelectorAll("[data-remove-sector]").forEach(b=>b.onclick=()=>removeSector(b.dataset.removeSector));
  document.querySelectorAll("[data-edit-user]").forEach(b=>b.onclick=()=>openUserPermissions(b.dataset.editUser));
  document.querySelectorAll("[data-make-admin]").forEach(b=>b.onclick=()=>{const u=state.users.find(x=>x.id===b.dataset.makeAdmin); if(u){u.role="admin";u.permissions=getCompany().sectors.map(s=>s.key);addLog("gestao","Novo administrador",`${u.name} agora é ADM`);save();render();toast("Usuário virou ADM.");}});
  document.querySelectorAll("[data-make-owner]").forEach(b=>b.onclick=()=>{const u=state.users.find(x=>x.id===b.dataset.makeOwner); if(u){u.role="owner";u.permissions=getCompany().sectors.map(s=>s.key);addLog("gestao","Novo ADM Principal",`${u.name} agora também é ADM Principal`);save();render();toast("Usuário virou ADM Principal.");}});
  document.querySelectorAll("[data-new-task]").forEach(b=>b.onclick=()=>openTaskModal());
  document.querySelectorAll("[data-new-task-tab]").forEach(b=>b.onclick=()=>openTaskModal({tab:b.dataset.newTaskTab}));
  document.querySelectorAll("[data-new-task-client]").forEach(b=>b.onclick=()=>openTaskModal({clientId:b.dataset.newTaskClient,tab:"Clientes"}));
  document.querySelectorAll("[data-edit-task]").forEach(b=>b.onclick=()=>openTaskModal({taskId:b.dataset.editTask}));
  document.querySelectorAll("[data-done-task]").forEach(b=>b.onclick=async()=>{const t=state.tasks.find(x=>x.id===b.dataset.doneTask); if(t){markTaskAsDone(t);await syncTaskToSupabase(t);addLog(t.sectorKey,"Tarefa concluída",`${t.title} • ${clientName(t.clientId)}`);save();render();toast("Tarefa concluída.");}});
  const gensec=document.querySelector("[data-generate-sector-month]"); if(gensec) gensec.onclick=()=>{generateMonthlyTasks(filterState.competence,false,activeSectorKey);render();toast("Pendências do setor geradas.");};
  const hist=document.querySelector("[data-open-history]"); if(hist) hist.onclick=openHistory;
  const sett=document.querySelector("[data-open-sector-settings]"); if(sett) sett.onclick=openSectorSettings;
  document.querySelectorAll("[data-export-sector]").forEach(b=>b.onclick=()=>downloadCSV(`tarefas_${activeSectorKey}.csv`, tasksToCSV(filteredTasks(activeSectorKey))));
  document.querySelectorAll("[data-export-clients]").forEach(b=>b.onclick=()=>downloadCSV(`clientes.csv`, clientsToCSV(getCompany().clients)));
  document.querySelectorAll("[data-download-sector-report]").forEach(b=>b.onclick=()=>downloadReport([b.dataset.downloadSectorReport]));
  document.querySelectorAll("[data-download-all]").forEach(b=>b.onclick=()=>downloadReport(getCompany().sectors.map(s=>s.key)));
  document.querySelectorAll("[data-profit-edit]").forEach(b=>b.onclick=()=>openProfitModal(b.dataset.profitEdit));

function val(id){return document.getElementById(id)?.value.trim()||"";}
async function approveRequest(id){
  const company=getCompany(); const r=company.requests.find(x=>x.id===id); if(!r)return;
  const perms=[...document.querySelectorAll(`[data-perm="${id}"]:checked`)].map(x=>x.value);
  if(!perms.length) return toast("Escolha pelo menos um setor para liberar.");
  try{
    if(usingSupabase && window.CEBackend){
      const approved = await CEBackend.aprovarUsuario(r.profileId||r.id, perms, "user");
      const u=mapProfileDb(approved); state.users.push(u); company.requests=company.requests.filter(x=>x.id!==id);
      addLog("gestao","Usuário aprovado",`${u.name} foi aprovado com ${perms.length} setor(es)`); save(); render(); toast("Usuário aprovado no banco."); return;
    }
    const u={id:uid("usr_"),companyId:company.id,name:r.name,email:r.email,password:r.password,role:"user",permissions:perms,preferences:{},createdAt:now()};
    state.users.push(u); r.status="approved"; addLog("gestao","Usuário aprovado",`${u.name} foi aprovado com ${perms.length} setor(es)`); save(); render(); toast("Usuário aprovado.");
  }catch(e){toast(e.message||"Erro ao aprovar usuário.");}
}
function removeSector(key){ const company=getCompany(); const s=company.sectors.find(x=>x.key===key); if(!s)return; company.sectors=company.sectors.filter(x=>x.key!==key); state.tasks=state.tasks.filter(t=>!(t.companyId===company.id && t.sectorKey===key)); state.users.filter(u=>u.companyId===company.id).forEach(u=>u.permissions=(u.permissions||[]).filter(p=>p!==key)); addLog("gestao","Setor excluído",`${s.name} foi removido`); save(); render(); toast("Setor excluído."); }
function recurringItemsForSector(sector){
  const map={
    gestao:[{tab:"Metas",title:"Revisar resultado mensal",status:"Pendente"}],
    contabil:[{tab:"DRE",title:"DRE INICIADA",status:"Pendente"}],
    fiscal:[{tab:"Obrigações",title:"Transmitir declaração fiscal mensal",status:"Pendente"}],
    financeiro:[{tab:"Cobranças",title:"Emitir cobrança mensal",status:"Pendente"}],
    dp:[{tab:"Folha",title:"Processar folha",status:"Pendente"}],
    compliance:[{tab:"Controles",title:"Revisar controle interno",status:"Pendente"}],
    auditoria:[{tab:"Planejamento",title:"Planejar auditoria",status:"Pendente"}],
    marketing:[{tab:"Métricas",title:"Atualizar métricas",status:"Pendente"}],
    comercial:[{tab:"Follow-up",title:"Realizar follow-up",status:"Pendente"}],
    rh:[{tab:"Pessoas",title:"Atualizar cadastro de colaborador",status:"Pendente"}]
  };
  return map[sector.key] || [];
}
function generateFrequentTasksForClient(clientId, month, onlySector=null){
  const company=getCompany(); const sectors=company.sectors.filter(s=>onlySector?s.key===onlySector:true);
  sectors.forEach(sector=>{
    recurringItemsForSector(sector).forEach((item,ti)=>{
      const exists=state.tasks.some(t=>t.companyId===company.id&&t.sectorKey===sector.key&&t.clientId===clientId&&t.competence===month&&t.tab===item.tab&&t.title===item.title);
      if(exists) return;
      const client=company.clients.find(c=>c.id===clientId); const responsible=client?.responsible || getUser().name;
      const task={id:uid("tsk_"),companyId:company.id,sectorKey:sector.key,clientId,title:item.title,tab:item.tab,competence:month,status:item.status||"Pendente",priority:ti===0?"Alta":"Normal",responsible,dueDate:"",avgHours:defaultHours(item.title,sector.key),value:0,quantity:1,notes:"Tarefa frequente gerada automaticamente para o mês de referência.",createdBy:getUser()?.id,updatedBy:getUser()?.id,createdAt:now(),updatedAt:now()}; state.tasks.push(task); syncTaskToSupabase(task);
    });
  });
}
function generateMonthlyTasks(month, all=false, onlySector=null){
  const company=getCompany(); const sectors=company.sectors.filter(s=>onlySector?s.key===onlySector:true); const clients=company.clients.filter(c=>c.active!==false);
  sectors.forEach(sector=>{ clients.forEach(client=>generateFrequentTasksForClient(client.id, month, sector.key)); });
  addLog(onlySector||"gestao","Pendências frequentes geradas",`${month} • ${onlySector?sectorByKey(onlySector).name:'todos os setores'} • somente rotinas recorrentes`); save();
}
function matchTab(sector,title){ const t=title.toLowerCase(); const tabs=sector.tabs; const found=tabs.find(tab=>t.includes(tab.toLowerCase().split("/")[0].split(" ")[0])); if(found)return found; if(t.includes("extrato"))return"Extratos"; if(t.includes("dre"))return"DRE"; if(t.includes("lucro"))return"Distribuição de Lucros"; if(t.includes("reuni"))return"Reuniões"; if(t.includes("nota"))return"Notas Fiscais"; if(t.includes("reinf")||t.includes("dctf"))return"Reinf/DCTFWeb"; if(t.includes("folha"))return"Folha"; if(t.includes("lead"))return"Leads"; if(t.includes("venda"))return"Vendas"; if(t.includes("risco"))return"Riscos"; return tabs[1]||"Visão Geral"; }
function dueDateFor(month,i){ const [mm,yy]=month.split("/"); return `${String(Math.min(28,5+i*2)).padStart(2,'0')}/${mm}/${yy}`; }
function defaultHours(title,key){ if(title.toLowerCase().includes("dre"))return 2.5; if(title.toLowerCase().includes("folha"))return 3; if(title.toLowerCase().includes("auditoria"))return 4; if(key==="comercial")return 1; return 1.5; }

function openModal(title, body, foot="", small=false){ const root=document.getElementById("modalRoot"); root.innerHTML=`<div class="modal ${small?'small':''}"><div class="modal-head"><h3>${title}</h3><button class="x" id="closeModal">×</button></div><div class="modal-body">${body}</div>${foot?`<div class="modal-foot">${foot}</div>`:""}</div>`; root.classList.add("open"); document.getElementById("closeModal").onclick=closeModal; root.onclick=e=>{if(e.target===root)closeModal();}; }
function closeModal(){ document.getElementById("modalRoot").classList.remove("open"); }
function openTaskModal(opts={}){
  const edit=opts.taskId?state.tasks.find(t=>t.id===opts.taskId):null; const sector=sectorByKey(activeSectorKey); const tab=opts.tab||edit?.tab||activeTab; const activeClients=getCompany().clients.filter(c=>c.active!==false); const clientId=opts.clientId||edit?.clientId||activeClients[0]?.id||"";
  const body=`<div class="form-grid"><div class="row"><div class="field"><label>${L("Cliente")}</label><div class="search-field"><span class="search-icon">🔎</span><input id="taskClientSearch" placeholder="Pesquisar cliente pelo nome ou CNPJ"></div><select id="taskClient">${activeClients.map(c=>`<option value="${c.id}" ${clientId===c.id?'selected':''}>${escapeHtml(c.name)}</option>`).join("")}</select></div><div class="field"><label>Aba/controle</label><select id="taskTab">${sector.tabs.filter(t=>!['Visão Geral','Performance','Relatório Executivo','Ranking'].includes(t)).map(t=>`<option ${tab===t?'selected':''}>${escapeHtml(t)}</option>`).join("")}</select></div></div><div class="row"><div class="field"><label>Ação desta aba</label><select id="taskTitle"></select></div><div class="field"><label>${L("Status")}</label><select id="taskStatus"></select></div></div><div class="row"><div class="field"><label>${L("Prioridade")}</label><select id="taskPriority">${PRIORITIES.map(p=>`<option ${edit?.priority===p?'selected':''}>${p}</option>`).join("")}</select></div><div class="field"><label>${L("Competência")}</label><select id="taskMonth">${MONTHS.map(m=>`<option ${edit?.competence===m||(!edit&&filterState.competence===m)?'selected':''}>${m}</option>`).join("")}</select></div></div><div class="row"><div class="field"><label>${L("Responsável")}</label><input id="taskResp" value="${escapeHtml(edit?.responsible||getUser().name)}"></div><div class="field"><label>Prazo</label><input id="taskDue" value="${escapeHtml(edit?.dueDate||"")}" placeholder="dd/mm/aaaa"></div></div><div class="row"><div class="field"><label>Tempo médio estimado em horas</label><input id="taskHours" type="number" step="0.1" value="${escapeHtml(edit?.avgHours||1)}"></div><div class="field"><label>Quantidade</label><input id="taskQty" type="number" value="${escapeHtml(edit?.quantity||1)}"></div></div><div class="row"><div class="field"><label>Quantidade de dinheiro</label><input id="taskValue" value="${formatMoney(edit?.value||0)}"><div class="money-preview" id="taskMoneyPreview">${formatMoney(edit?.value||0)}</div></div><div class="field"><label>Observação</label><textarea id="taskNotes">${escapeHtml(edit?.notes||"")}</textarea></div></div><div class="task-flow-note" id="taskFlowNote"></div></div>`;
  openModal(edit?"Editar tarefa":"Nova tarefa", body, `<button class="btn secondary" id="cancelModal">Cancelar</button><button class="btn gold" id="saveTask">Salvar tarefa</button>`);
  document.getElementById("cancelModal").onclick=closeModal;
  document.getElementById("taskClientSearch").oninput=filterTaskClientOptions;
  document.getElementById("taskTab").onchange=()=>syncTaskWorkflow(edit);
  filterTaskClientOptions();
  document.getElementById("taskClient").value = clientId;
  syncTaskWorkflow(edit);
  setupMoneyInput("taskValue","taskMoneyPreview");
  document.getElementById("saveTask").onclick=async()=>{ const data={clientId:val("taskClient"),tab:val("taskTab"),title:val("taskTitle"),status:val("taskStatus"),priority:val("taskPriority"),responsible:val("taskResp"),competence:val("taskMonth"),dueDate:val("taskDue"),avgHours:Number(val("taskHours"))||0,quantity:Number(val("taskQty"))||1,value:parseMoney(val("taskValue")),notes:val("taskNotes")}; if(!data.title)return toast("Escolha a ação da tarefa."); let taskRef; if(edit){Object.assign(edit,data,{updatedBy:getUser().id,updatedAt:now()}); taskRef=edit; addLog(activeSectorKey,"Tarefa alterada",`${data.title} • ${clientName(data.clientId)}`);} else {taskRef={id:uid("tsk_"),companyId:getCompany().id,sectorKey:activeSectorKey,...data,createdBy:getUser().id,updatedBy:getUser().id,createdAt:now(),updatedAt:now()}; state.tasks.push(taskRef); addLog(activeSectorKey,"Tarefa criada",`${data.title} • ${clientName(data.clientId)}`);} await syncTaskToSupabase(taskRef); save(); closeModal(); render(); toast("Tarefa salva."); };
}
function openHistory(){ const logs=state.logs.filter(l=>l.companyId===getCompany().id&&l.sectorKey===activeSectorKey); openModal("Histórico do setor", renderHistoryList(logs), "", false); }
function getSectorPrefs(key){ const u=getUser(); u.preferences??={}; u.preferences[key]??={}; const sector=sectorByKey(key); const raw=u.preferences[key]; const bg=raw.bg||""; const card=raw.card||""; const contrastBase=card||bg||"#f4f6f9"; return {bg,card,accent:raw.accent||sector?.color||"#1d4ed8",font:raw.font||"Inter",language:raw.language||"Português",ink:raw.ink||readableTextFor(contrastBase),muted:raw.muted||readableMutedFor(contrastBase),button:raw.button||"#111827",sidebar:raw.sidebar||"#0d1526",topbar:raw.topbar||"#ffffff",...raw}; }
function openSectorSettings(){ const p=getSectorPrefs(activeSectorKey); const body=`<div class="settings-grid"><div class="field"><label>Fonte</label><select id="prefFont"><option ${p.font==='Inter'?'selected':''}>Inter</option><option ${p.font==='Georgia'?'selected':''}>Georgia</option><option ${p.font==='Arial'?'selected':''}>Arial</option><option ${p.font==='Verdana'?'selected':''}>Verdana</option></select></div><div class="field"><label>Idioma visual</label><select id="prefLang"><option ${p.language==='Português'?'selected':''}>Português</option><option ${p.language==='English'?'selected':''}>English</option><option ${p.language==='Español'?'selected':''}>Español</option></select></div><div class="field"><label>Cor de destaque</label><input type="color" id="prefAccent" value="${p.accent}"></div><div class="field"><label>Cor de fundo</label><input type="color" id="prefBg" value="${p.bg||'#f4f6f9'}"></div><div class="field"><label>Cor dos blocos/cards</label><input type="color" id="prefCard" value="${p.card||'#ffffff'}"></div><div class="field"><label>Cor do texto principal</label><input type="color" id="prefInk" value="${p.ink}"></div><div class="field"><label>Cor do texto secundário</label><input type="color" id="prefMuted" value="${p.muted}"></div><div class="field"><label>Cor dos botões principais</label><input type="color" id="prefButton" value="${p.button}"></div><div class="field"><label>Cor da barra lateral</label><input type="color" id="prefSidebar" value="${p.sidebar}"></div><div class="field"><label>Cor da barra superior</label><input type="color" id="prefTopbar" value="${p.topbar}"></div><div class="field"><label>Resetar</label><button class="btn secondary" id="resetPrefs">Padrão do setor</button></div></div><div class="notice" style="margin-top:14px">Essa personalização fica salva apenas para você e somente neste setor. Se você escolher fundo escuro, o sistema já sugere texto claro para manter a leitura.</div>`;
  openModal("Personalização do setor", body, `<button class="btn secondary" id="cancelModal">Cancelar</button><button class="btn gold" id="savePrefs">Salvar personalização</button>`, false);
  document.getElementById("prefBg").oninput=()=>{document.getElementById("prefInk").value=readableTextFor(val("prefBg"));document.getElementById("prefMuted").value=readableMutedFor(val("prefBg"));};
  document.getElementById("cancelModal").onclick=closeModal;
  document.getElementById("resetPrefs").onclick=()=>{getUser().preferences[activeSectorKey]={}; save(); closeModal(); render();};
  document.getElementById("savePrefs").onclick=()=>{const u=getUser();u.preferences??={};u.preferences[activeSectorKey]={font:val("prefFont"),language:val("prefLang"),accent:val("prefAccent"),bg:val("prefBg"),card:val("prefCard"),ink:val("prefInk"),muted:val("prefMuted"),button:val("prefButton"),sidebar:val("prefSidebar"),topbar:val("prefTopbar")}; addLog(activeSectorKey,"Personalização alterada","Preferências visuais do usuário foram atualizadas"); save(); closeModal(); render(); toast("Personalização salva.");};
}
function applySectorPreferences(){
  if(screen!=="sector"||!activeSectorKey){ document.documentElement.style.setProperty('--bg','#f4f6f9'); document.documentElement.style.setProperty('--card','#ffffff'); document.documentElement.style.setProperty('--ink','#111827'); document.documentElement.style.setProperty('--muted','#6b7280'); document.documentElement.style.setProperty('--nav','#101827'); document.documentElement.style.setProperty('--accent','#1d4ed8'); return; }
  const p=getSectorPrefs(activeSectorKey); const page=document.querySelector(".page"); const side=document.querySelector(".sidebar"); const top=document.querySelector(".topbar");
  if(page){page.style.background=p.bg||"";page.style.fontFamily=p.font||"";} if(side){side.style.background=`linear-gradient(180deg,${p.sidebar},#111827 70%,#0b1120)`;} if(top){top.style.background=p.topbar; top.style.color=readableTextFor(p.topbar);} 
  document.documentElement.style.setProperty('--accent',p.accent||sectorByKey(activeSectorKey).color); document.documentElement.style.setProperty('--card',p.card||'#ffffff'); document.documentElement.style.setProperty('--ink',p.ink||readableTextFor(p.bg||'#f4f6f9')); document.documentElement.style.setProperty('--muted',p.muted||readableMutedFor(p.bg||'#f4f6f9')); document.documentElement.style.setProperty('--nav',p.button||'#111827');
}
function openAddSector(){ const body=`<div class="form-grid"><div class="field"><label>Nome do setor</label><input id="newSectorName" placeholder="Ex: BPO Financeiro"></div><div class="row"><div class="field"><label>Ícone</label><input id="newSectorIcon" value="💼"></div><div class="field"><label>Cor do setor</label><input id="newSectorColor" type="color" value="#111827"></div></div><div class="field"><label>Descrição</label><textarea id="newSectorDesc" placeholder="Explique o controle desse setor"></textarea></div><div class="field"><label>Abas separadas por vírgula</label><input id="newSectorTabs" value="Visão Geral, Clientes, Pendências, Performance, Ranking, Relatório Executivo"></div><div class="field"><label>Tarefas mensais padrão separadas por vírgula</label><textarea id="newSectorTemplates">Receber documentos, Conferir informações, Executar tarefa mensal, Enviar retorno ao cliente</textarea></div></div>`; openModal("Adicionar novo setor", body, `<button class="btn secondary" id="cancelModal">Cancelar</button><button class="btn gold" id="saveSector">Adicionar setor</button>`); document.getElementById("cancelModal").onclick=closeModal; document.getElementById("saveSector").onclick=()=>{const name=val("newSectorName"); if(!name)return toast("Informe o nome do setor."); const key=normalizeKey(name); if(getCompany().sectors.some(s=>s.key===key))return toast("Já existe setor com esse nome."); const s={key,name,icon:val("newSectorIcon")||"💼",color:val("newSectorColor")||"#111827",desc:val("newSectorDesc")||"Setor personalizado",tabs:val("newSectorTabs").split(",").map(x=>x.trim()).filter(Boolean),templates:val("newSectorTemplates").split(",").map(x=>x.trim()).filter(Boolean)}; if(!s.tabs.includes("Performance"))s.tabs.push("Performance"); if(!s.tabs.includes("Relatório Executivo"))s.tabs.push("Relatório Executivo"); getCompany().sectors.push(s); state.users.filter(u=>u.companyId===getCompany().id&&u.role!=="user").forEach(u=>u.permissions.push(key)); addLog("gestao","Setor adicionado",`${name} foi criado`); save(); closeModal(); render(); toast("Setor adicionado.");}; }
function openUserPermissions(userId){ const u=state.users.find(x=>x.id===userId); const body=`<div class="form-grid"><div class="notice">Usuário: <b>${escapeHtml(u.name)}</b> • ${escapeHtml(u.email)}</div><div class="check-grid">${getCompany().sectors.map(s=>`<label class="check-tile"><input type="checkbox" id="perm_${s.key}" value="${s.key}" ${u.permissions?.includes(s.key)?'checked':''}> ${s.icon} ${escapeHtml(s.name)}</label>`).join("")}</div></div>`; openModal("Editar permissões", body, `<button class="btn secondary" id="cancelModal">Cancelar</button><button class="btn gold" id="savePerms">Salvar permissões</button>`); document.getElementById("cancelModal").onclick=closeModal; document.getElementById("savePerms").onclick=()=>{u.permissions=[...document.querySelectorAll('[id^="perm_"]:checked')].map(x=>x.value); addLog("gestao","Permissões alteradas",`${u.name} agora tem ${u.permissions.length} setor(es)`); save(); closeModal(); render(); toast("Permissões salvas.");}; }
function openForgotPassword(){
  const body=`<div class="form-grid"><div class="field"><label>E-mail cadastrado</label><input id="resetEmail" placeholder="seuemail@empresa.com.br"></div><button class="btn gold" id="sendCode">Enviar código</button><div id="codeBox" class="notice hidden"></div><div class="row"><div class="field"><label>Código recebido</label><input id="resetCode" placeholder="000000"></div><div class="field"><label>Nova senha</label><input id="resetNewPass" type="password"></div></div></div>`;
  openModal("Recuperar senha", body, `<button class="btn secondary" id="cancelModal">Cancelar</button><button class="btn" id="confirmReset">Alterar senha</button>`, true);
  document.getElementById("cancelModal").onclick=closeModal;
  document.getElementById("sendCode").onclick=async()=>{
    const email=val("resetEmail").toLowerCase(); if(!email)return toast("Informe o e-mail.");
    try{
      if(window.CEBackend){ await CEBackend.enviarCodigoRecuperacao(email); const box=document.getElementById("codeBox"); box.classList.remove("hidden"); box.innerHTML=`<b>Código enviado para o e-mail.</b><br><span>Abra seu Gmail/Outlook, copie o código e informe abaixo.</span>`; return; }
      const u=state.users.find(x=>x.email.toLowerCase()===email); if(!u)return toast("E-mail não encontrado."); const code=String(Math.floor(100000+Math.random()*900000)); state.passwordResets=state.passwordResets.filter(r=>r.email!==email); state.passwordResets.push({email,code,createdAt:Date.now()}); save(); const box=document.getElementById("codeBox"); box.classList.remove("hidden"); box.innerHTML=`<b>Código enviado:</b> ${code}<br><span>Simulação: em produção esse código será enviado para o e-mail do usuário.</span>`;
    }catch(e){toast(e.message||"Erro ao enviar código.");}
  };
  document.getElementById("confirmReset").onclick=async()=>{
    const email=val("resetEmail").toLowerCase(); const code=val("resetCode"); const pass=val("resetNewPass");
    if(!email||!code||!pass)return toast("Informe e-mail, código e nova senha.");
    try{
      if(window.CEBackend){ await CEBackend.confirmarCodigoENovaSenha({email,codigo:code,novaSenha:pass}); closeModal(); toast("Senha alterada com sucesso. Faça login novamente."); return; }
      const reset=state.passwordResets.find(r=>r.email===email&&r.code===code); if(!reset)return toast("Código inválido."); const u=state.users.find(x=>x.email.toLowerCase()===email); u.password=pass; state.passwordResets=state.passwordResets.filter(r=>r!==reset); save(); closeModal(); toast("Senha alterada com sucesso.");
    }catch(e){toast(e.message||"Código inválido ou expirado.");}
  };
}

function buildReportHTML(sectorKeys, standalone=true){
  const company=getCompany(); const sectors=company.sectors.filter(s=>sectorKeys.includes(s.key));
  const parts=sectors.map(s=>{const list=state.tasks.filter(t=>t.companyId===company.id&&t.sectorKey===s.key&&t.competence===filterState.competence); const done=list.filter(t=>normalizeStatusForDone(t.status)).length; const pending=list.length-done; const rate=list.length?Math.round(done/list.length*100):0; return `<div class="report-preview"><div class="report-cover"><h2>${s.icon} ${escapeHtml(s.name)}</h2><p>Relatório executivo • Competência ${filterState.competence} • ${escapeHtml(company.name)}</p></div><div class="dashboard-grid">${kpi("Conclusão",rate+"%","Taxa de execução","navy","📌")}${kpi("Finalizadas",done,"Concluídas ou enviadas","green","✅")}${kpi("Pendentes",pending,"Abertas no período","gold","⚠️")}${kpi("Clientes",new Set(list.map(t=>t.clientId)).size,"Movimentados","blue","👥")}</div><div class="divider"></div><h3>Principais indicadores</h3><div class="metric-list"><div class="metric-item"><span>Tempo médio por tarefa</span><b>${avgTime(list)}h</b></div><div class="metric-item"><span>Atrasos críticos</span><b>${list.filter(t=>t.status==='Atrasada'||t.priority==='Crítica').length}</b></div><div class="metric-item"><span>Valor registrado</span><b>R$ ${list.reduce((a,t)=>a+(Number(t.value)||0),0).toLocaleString('pt-BR')}</b></div></div><div class="divider"></div><h3>Tarefas e pendências</h3>${renderTasksTable(list,true)}</div>`}).join("<br>");
  if(!standalone) return parts;
  const fecharStyle = "</sty" + "le>";
  const fecharBody = "</bo" + "dy>";
  const fecharHtml = "</ht" + "ml>";
  return `<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><title>Relatório Executivo</title><style>${document.querySelector('style').innerHTML}
    .side-nav button.active[data-sector]{background:rgba(34,197,94,.18);color:#dcfce7;border:1px solid rgba(74,222,128,.30);box-shadow:inset 0 0 0 1px rgba(34,197,94,.10)}
    .money-preview{padding:10px 12px;border:1px solid #dbeafe;background:#eff6ff;border-radius:12px;color:#1e3a8a;font-weight:900;font-size:13px}
    .special-table-note{padding:13px 14px;border-radius:16px;background:#f8fafc;border:1px dashed #cbd5e1;color:#475569;font-size:13px;line-height:1.55;margin-bottom:14px}
    .tab-context{display:flex;gap:8px;flex-wrap:wrap;margin:0 0 14px}
    .dark-auto-note{font-size:12px;color:#64748b;line-height:1.5}
${fecharStyle}</head><body><section class="page">${parts}</section>${fecharBody}${fecharHtml}`;
}
function downloadReport(keys){ const html=buildReportHTML(keys,true); const name=keys.length>1?`relatorio_geral_${filterState.competence.replace('/','_')}.html`:`relatorio_${keys[0]}_${filterState.competence.replace('/','_')}.html`; downloadText(name,html,"text/html"); }
function downloadText(filename, content, type="text/plain"){ const blob=new Blob([content],{type}); const url=URL.createObjectURL(blob); const a=document.createElement("a"); a.href=url; a.download=filename; a.click(); setTimeout(()=>URL.revokeObjectURL(url),1000); }
function downloadCSV(name,csv){ downloadText(name,csv,"text/csv;charset=utf-8"); }
function tasksToCSV(tasks){ const head=["Cliente","Setor","Aba","Tarefa","Status","Responsavel","Competencia","Prazo","TempoMedio","Prioridade","AtualizadoPor"]; const rows=tasks.map(t=>[clientName(t.clientId),sectorByKey(t.sectorKey)?.name,t.tab,t.title,t.status,t.responsible,t.competence,t.dueDate,t.avgHours,t.priority,userName(t.updatedBy)].map(csvEsc).join(";")); return [head.join(";"),...rows].join("\n"); }
function clientsToCSV(clients){ const head=["Cliente","CNPJ","Plano","Responsavel","Segmento","Status"]; const rows=clients.map(c=>[c.name,c.cnpj,c.plan,c.responsible,c.segment,c.active!==false?'Ativo':'Inativo'].map(csvEsc).join(";")); return [head.join(";"),...rows].join("\n"); }
function csvEsc(v){ return `"${String(v??"").replaceAll('"','""')}"`; }

boot();
</script>
