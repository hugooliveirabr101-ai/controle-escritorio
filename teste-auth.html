<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Teste Auth Supabase</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 30px;
      background: #f3f4f6;
    }

    .card {
      max-width: 520px;
      background: white;
      padding: 24px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,.08);
      margin-bottom: 20px;
    }

    input, button {
      width: 100%;
      padding: 12px;
      margin-top: 8px;
      margin-bottom: 12px;
      border-radius: 10px;
      border: 1px solid #ddd;
      box-sizing: border-box;
    }

    button {
      background: #111827;
      color: white;
      cursor: pointer;
      font-weight: bold;
    }

    pre {
      background: #111827;
      color: #d1fae5;
      padding: 16px;
      border-radius: 12px;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>

  <h1>Teste de Login Real com Supabase</h1>

  <div class="card">
    <h2>1. Criar conta</h2>
    <input id="signupEmail" placeholder="E-mail">
    <input id="signupPassword" type="password" placeholder="Senha">
    <button id="signupBtn">Cadastrar usuário</button>
  </div>

  <div class="card">
    <h2>2. Entrar</h2>
    <input id="loginEmail" placeholder="E-mail">
    <input id="loginPassword" type="password" placeholder="Senha">
    <button id="loginBtn">Entrar</button>
  </div>

  <div class="card">
    <h2>3. Ver sessão atual</h2>
    <button id="sessionBtn">Ver sessão</button>
    <button id="logoutBtn">Sair</button>
  </div>

  <div class="card">
    <h2>4. Recuperar senha por código</h2>
    <input id="resetEmail" placeholder="E-mail para recuperar senha">
    <button id="sendResetBtn">Enviar código</button>

    <input id="resetCode" placeholder="Código recebido no e-mail">
    <input id="newPassword" type="password" placeholder="Nova senha">
    <button id="confirmResetBtn">Confirmar código e alterar senha</button>
  </div>

  <pre id="resultado">Resultado aparecerá aqui...</pre>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    const SUPABASE_URL = "https://ccseivxfbwmszegmgicj.supabase.co";
    const SUPABASE_PUBLISHABLE_KEY = "sb_publishable_SznpFAglmFsronkE8dhPlg_vcf4j9LU";

    const supabaseClient = window.supabase.createClient(
      SUPABASE_URL,
      SUPABASE_PUBLISHABLE_KEY
    );

    const resultado = document.getElementById("resultado");

    function mostrar(titulo, conteudo) {
      resultado.textContent = titulo + "\n\n" + JSON.stringify(conteudo, null, 2);
    }

    function mostrarErro(titulo, erro) {
      resultado.textContent = titulo + "\n\n" + (erro?.message || erro);
    }

    document.getElementById("signupBtn").onclick = async () => {
      const email = document.getElementById("signupEmail").value.trim();
      const password = document.getElementById("signupPassword").value.trim();

      if (!email || !password) {
        alert("Informe e-mail e senha.");
        return;
      }

      const { data, error } = await supabaseClient.auth.signUp({
        email,
        password
      });

      if (error) {
        mostrarErro("Erro ao cadastrar usuário", error);
        return;
      }

      mostrar("Usuário cadastrado com sucesso", data);
    };

    document.getElementById("loginBtn").onclick = async () => {
      const email = document.getElementById("loginEmail").value.trim();
      const password = document.getElementById("loginPassword").value.trim();

      if (!email || !password) {
        alert("Informe e-mail e senha.");
        return;
      }

      const { data, error } = await supabaseClient.auth.signInWithPassword({
        email,
        password
      });

      if (error) {
        mostrarErro("Erro ao entrar", error);
        return;
      }

      mostrar("Login realizado com sucesso", data);
    };

    document.getElementById("sessionBtn").onclick = async () => {
      const { data, error } = await supabaseClient.auth.getSession();

      if (error) {
        mostrarErro("Erro ao buscar sessão", error);
        return;
      }

      mostrar("Sessão atual", data);
    };

    document.getElementById("logoutBtn").onclick = async () => {
      const { error } = await supabaseClient.auth.signOut();

      if (error) {
        mostrarErro("Erro ao sair", error);
        return;
      }

      mostrar("Usuário saiu da conta", { ok: true });
    };

    document.getElementById("sendResetBtn").onclick = async () => {
      const email = document.getElementById("resetEmail").value.trim();

      if (!email) {
        alert("Informe o e-mail.");
        return;
      }

      const { data, error } = await supabaseClient.auth.resetPasswordForEmail(email);

      if (error) {
        mostrarErro("Erro ao enviar código de recuperação", error);
        return;
      }

      mostrar("Código de recuperação enviado para o e-mail", data);
    };

    document.getElementById("confirmResetBtn").onclick = async () => {
      const email = document.getElementById("resetEmail").value.trim();
      const token = document.getElementById("resetCode").value.trim();
      const novaSenha = document.getElementById("newPassword").value.trim();

      if (!email || !token || !novaSenha) {
        alert("Informe e-mail, código e nova senha.");
        return;
      }

      const { data: verifyData, error: verifyError } = await supabaseClient.auth.verifyOtp({
        email,
        token,
        type: "recovery"
      });

      if (verifyError) {
        mostrarErro("Código inválido ou expirado", verifyError);
        return;
      }

      const { data: updateData, error: updateError } = await supabaseClient.auth.updateUser({
        password: novaSenha
      });

      if (updateError) {
        mostrarErro("Erro ao atualizar senha", updateError);
        return;
      }

      mostrar("Senha alterada com sucesso", {
        verifyData,
        updateData
      });
    };
  </script>
</body>
</html>
