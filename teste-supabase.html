<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Teste Supabase</title>
</head>
<body>
  <h1>Teste de conexão com Supabase</h1>

  <button id="testar">Testar conexão</button>

  <pre id="resultado"></pre>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    const SUPABASE_URL = "https://ccseivxfbwmszegmgicj.supabase.co";
    const SUPABASE_PUBLISHABLE_KEY = "sb_publishable_SznpFAglmFsronkE8dhPlg_vcf4j9LU";

    const supabaseClient = window.supabase.createClient(
      SUPABASE_URL,
      SUPABASE_PUBLISHABLE_KEY
    );

    document.getElementById("testar").onclick = async () => {
      const resultado = document.getElementById("resultado");

      try {
        const { data, error } = await supabaseClient.auth.getSession();

        if (error) {
          resultado.textContent = "Erro na conexão: " + error.message;
          return;
        }

        resultado.textContent =
          "Conexão funcionando!\n\nSessão atual:\n" +
          JSON.stringify(data, null, 2);
      } catch (err) {
        resultado.textContent = "Erro inesperado: " + err.message;
      }
    };
  </script>
</body>
</html>
